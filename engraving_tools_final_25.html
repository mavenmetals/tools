<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Engraving Tools — GPS, Symbol, & Character Counter</title>

<!-- 🤓 Emoji Favicon -->
<link rel="icon" 
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤓</text></svg>">

<style>
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif;
    background:#f7f7f8;
    color:#111;
    margin:0;
    padding:40px 16px;
    display:flex;
    justify-content:center;
  }

  .container { width:100%; max-width:720px; }

  h1 {
    font-size:1.5rem;
    margin-bottom:1.2rem;
    text-align:center;
  }

  /* Box card style for each tool */
  .tool-card {
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 28px 28px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    margin-bottom:28px;
  }

  h2 {
    font-size:1.1rem;
    margin:0 0 12px;
    border-bottom:1px solid #eee;
    padding-bottom:6px;
  }

  /* GPS Cleaner styling */
  .gps-card label {
    display:block;
    font-weight:600;
    margin:10px 0 6px;
    font-size:0.9rem;
  }
  .gps-card textarea,
  .gps-card input[type="text"] {
    width:100%;
    display:block;
    padding:10px 12px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
  }
  .gps-card textarea { min-height:45px; resize:vertical; }
  .gps-card input[type="text"] { height:36px; }
  .gps-row {
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .gps-btn {
    padding:8px 14px;
    border:1px solid #111827;
    background:#111827;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:0.9rem;
  }
  .gps-btn.ghost { background:transparent; color:#111827; }
  .gps-help { font-size:12px; color:#6b7280; margin-top:4px; }

  /* Symbol converter styling */
  .grid { display:grid; gap:12px; grid-template-columns: 1fr .8fr; align-items:start; }
  @media (max-width:640px) { .grid { grid-template-columns:1fr; } }
  .grid > div:first-child { padding-right: 12px; }
  .row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .options { margin:8px 0 0; display:flex; flex-direction:column; gap:6px; }
  label { font-weight:600; font-size:0.85rem; }
  textarea {
    width:100%; min-height:120px;
    resize:vertical; padding:8px;
    border:1px solid #ccc; border-radius:8px;
    font-size:0.95rem; box-sizing:border-box;
  }
  #sym_output { min-height:36px; max-height:60px; }
  input[type="text"] {
    padding:6px; border:1px solid #ccc; border-radius:8px;
    font-size:0.9rem; width:120px; box-sizing:border-box;
  }
  button {
    padding:8px 12px; border:1px solid #111; background:#111;
    color:#fff; border-radius:8px; cursor:pointer; font-size:0.9rem;
  }
  button.secondary { background:#fff; color:#111; }
  .table { display:flex; flex-direction:column; gap:6px; }
  .mapping { display:flex; gap:6px; align-items:center; }
  .mapping input { width:110px; }
  .muted { color:#666; font-size:0.8rem; }
  .small { font-size:0.8rem; }

  /* Character Counter styling */
  .counter-box textarea {
    width:100%;
    height:100px;
    border:1px solid #d1d5db;
    border-radius:8px;
    padding:10px;
    font-size:15px;
    resize:none;
  }
  .count {
    margin-top:10px;
    text-align:center;
    font-weight:600;
    color:#111827;
    font-size:16px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Engraving Tools Dashboard</h1>

  <!-- GPS Coordinate Cleaner -->
  <div class="tool-card gps-card">
    <h2>GPS Coordinate Cleaner (DMS)</h2>
    <label for="gps_in">Input</label>
    <textarea id="gps_in" placeholder='e.g. 44* 59' 25.5" N 122* 43' 59.2" W'></textarea>

    <div class="gps-row">
      <button id="gps_fmt" class="gps-btn">Format</button>
      <button id="gps_clear" class="gps-btn ghost">Clear</button>
      <label style="margin-left:auto; display:flex; align-items:center; gap:4px; font-size:0.85rem;">
        <input type="checkbox" id="gps_addDots" /> Add dots (•)
      </label>
    </div>

    <label for="gps_out" style="margin-top:12px;">Output</label>
    <div class="gps-row">
      <input id="gps_out" type="text" placeholder="Formatted result appears here" readonly />
      <button id="gps_copy" class="gps-btn ghost">Copy</button>
    </div>
    <div class="gps-help">Format: <code>DD° MM' SS.S" H  DD° MM' SS.S" H</code></div>
  </div>

  <!-- Symbol Converter -->
  <div class="tool-card">
    <h2>Symbol Converter</h2>
    <div class="grid">
      <div>
        <label for="sym_input">Input</label>
        <textarea id="sym_input" placeholder="Type or paste text here..."></textarea>
      </div>
      <div>
        <label>Rules (top to bottom)</label>
        <div id="sym_rules" class="table"></div>

        <div class="row" style="margin-top:6px;">
          <button id="sym_add">+ Add</button>
          <button id="sym_convert">Convert</button>
          <button id="sym_clear" class="secondary">Clear</button>
        </div>

        <div class="options">
          <label><input type="checkbox" id="sym_uppercase" /> Uppercase output</label>
          <label><input type="checkbox" id="sym_capitalize" /> Capitalize each word</label>
        </div>
        <p class="muted small">Tip: Order matters.</p>
      </div>
    </div>

    <div style="margin-top:10px;">
      <label for="sym_output">Output</label>
      <div class="gps-row">
        <textarea id="sym_output" readonly></textarea>
        <button id="sym_copy" class="secondary">Copy</button>
      </div>
    </div>
  </div>

  <!-- Character Counter -->
  <div class="tool-card counter-box">
    <h2>Character Counter (No Spaces)</h2>
    <textarea id="inputText" placeholder="Type or paste text here..."></textarea>
    <div class="count">Characters (no spaces): <span id="charCount">0</span></div>
  </div>
</div>

<script>
/* GPS Cleaner Script */
function gpsNormalizeSymbols(str){
  return str.replace(/\*/g,'°')
            .replace(/[º˚]/g,'°')
            .replace(/[’‘`‛ʼˈʹʽ′]/g,"'")
            .replace(/[”“‟˝ˮ″]/g,'"')
            .replace(/\s+/g,' ')
            .trim();
}
function gpsSplitLatLon(s){
  const h=s.match(/([NS])[^NSEW]*([EW])/i);
  if(h){
    const i=s.search(/[NS]/i);
    const a=s.slice(i).search(/[NS]/i)+i+1;
    const lat=s.slice(0,a).trim().replace(/[,;]$/,'');
    const lon=s.slice(a).trim();
    return[lat,lon];
  }
  const p=s.split(/,\s*| {2,}|\s\/\s/).map(x=>x.trim()).filter(Boolean);
  if(p.length===2)return p;
  return[s,''];
}
function gpsFormatSingleDMS(coord){
  if(!coord)return'';
  const c=gpsNormalizeSymbols(coord.toUpperCase());
  const re=new RegExp(
    String.raw`^\s*(-?\d{1,3})\s*°?\s*(\d{1,2})\s*['’′]?\s*(\d{1,2}(?:\.\d+)?)\s*["”″]?\s*([NSEW])\s*$`,'i'
  );
  const m=c.match(re);
  if(m){
    let[,D,M,S,H]=m;
    return `${parseInt(D,10)}° ${M}' ${S}" ${H.toUpperCase()}`;
  }
  return c;
}
function gpsFormatFull(input,withDots){
  const s=gpsNormalizeSymbols(input);
  const[latRaw,lonRaw]=gpsSplitLatLon(s);
  const lat=gpsFormatSingleDMS(latRaw);
  const lon=gpsFormatSingleDMS(lonRaw);
  if(lat&&lon)return withDots?`${lat}  •  ${lon}  •`:`${lat}  ${lon}`;
  if(withDots&&lat)return`${lat}  •`;
  return lat||lon||'';
}
document.getElementById('gps_fmt').addEventListener('click',()=>{
  const withDots=document.getElementById('gps_addDots').checked;
  document.getElementById('gps_out').value=gpsFormatFull(document.getElementById('gps_in').value,withDots);
});
document.getElementById('gps_clear').addEventListener('click',()=>{
  document.getElementById('gps_in').value='';
  document.getElementById('gps_out').value='';
});

/* GPS Copy button */
const gpsCopyBtn = document.getElementById('gps_copy');
gpsCopyBtn.addEventListener('click', async () => {
  const val = document.getElementById('gps_out').value;
  if (!val) return;
  try {
    await navigator.clipboard.writeText(val);
    gpsCopyBtn.textContent = 'Copied!';
    setTimeout(() => gpsCopyBtn.textContent = 'Copy', 1000);
  } catch (e) {
    alert('Copy failed. Please copy manually.');
  }
});

/* Symbol Converter Script */
const symRulesEl=document.getElementById('sym_rules');
const symInputEl=document.getElementById('sym_input');
const symOutputEl=document.getElementById('sym_output');
const symConvertBtn=document.getElementById('sym_convert');
const symClearBtn=document.getElementById('sym_clear');
const symUppercaseEl=document.getElementById('sym_uppercase');
const symCapitalizeEl=document.getElementById('sym_capitalize');
const symCopyBtn=document.getElementById('sym_copy');

function symAddRule(from='',to=''){
  const row=document.createElement('div');
  row.className='mapping';
  row.innerHTML=
    `<span class="small">Replace</span>
     <input type="text" value="${from}" data-role="from" />
     <span class="small">with</span>
     <input type="text" value="${to}" data-role="to" />
     <button class="secondary small" data-role="delete">✕</button>`;
  row.querySelector('[data-role="delete"]').addEventListener('click',()=>row.remove());
  symRulesEl.appendChild(row);
}

[['//','•'],['/','  '],['-','•'],['*','•'],['<3','♥'],['+','†']]
  .forEach(r=>symAddRule(r[0],r[1]));

function symGetRules(){
  return [...symRulesEl.querySelectorAll('.mapping')]
    .map(r=>({
      from:r.querySelector('[data-role="from"]').value,
      to:r.querySelector('[data-role="to"]').value
    }))
    .filter(x=>x.from!=='');
}
function symReplaceAllSafe(text,findStr,replaceStr){
  const e=findStr.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(e,'g'),replaceStr);
}
function symCapitalizeEachWord(str){
  return str.replace(/\b\w/g,c=>c.toUpperCase());
}
function symConvert(){
  let r=symInputEl.value;
  for(const{from,to}of symGetRules()){
    r=symReplaceAllSafe(r,from,to);
  }
  if(symUppercaseEl.checked){
    r=r.toUpperCase();
  } else if(symCapitalizeEl.checked){
    r=symCapitalizeEachWord(r.toLowerCase());
  }
  symOutputEl.value=r;
}
symConvertBtn.addEventListener('click',symConvert);
symClearBtn.addEventListener('click',()=>{
  symInputEl.value='';
  symOutputEl.value='';
});
symInputEl.addEventListener('input',symConvert);
symRulesEl.addEventListener('input',symConvert);
symUppercaseEl.addEventListener('change',symConvert);
symCapitalizeEl.addEventListener('change',symConvert);

/* Symbol Copy button */
symCopyBtn.addEventListener('click', async () => {
  const val = symOutputEl.value;
  if (!val) return;
  try {
    await navigator.clipboard.writeText(val);
    symCopyBtn.textContent = 'Copied!';
    setTimeout(() => symCopyBtn.textContent = 'Copy', 1000);
  } catch (e) {
    alert('Copy failed. Please copy manually.');
  }
});

/* Character Counter Script */
const textarea = document.getElementById('inputText');
const countDisplay = document.getElementById('charCount');
textarea.addEventListener('input', () => {
  const textWithoutSpaces = textarea.value.replace(/\s/g, '');
  countDisplay.textContent = textWithoutSpaces.length;
});
</script>
</body>
</html>
